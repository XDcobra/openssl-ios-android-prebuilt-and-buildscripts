name: Release Maven

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      MAVEN_REPO_PAT:
        required: true

concurrency:
  group: release-maven-${{ inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  maven_release:
    name: Deploy to Maven
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Build Repo
        uses: actions/checkout@v6

      - name: Download Android Artifact
        uses: actions/download-artifact@v7
        with:
          name: openssl-android

      - name: Extract Android Target
        run: |
          mkdir -p android_out
          unzip openssl-android.zip -d android_out

      - name: Package AAR
        run: |
          mkdir -p aar-content/jni
          # Copy jniLibs safely
          if [ -d android_out/jniLibs ]; then
             cp -r android_out/jniLibs/* aar-content/jni/ || true
          fi
          
          # Create a minimal AndroidManifest.xml required for AAR validity
          cat << 'EOF' > aar-content/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.xdcobra.openssl" />
          EOF
          
          # Pack everything into an AAR file
          cd aar-content
          zip -r ../openssl-${{ inputs.version }}.aar *
          cd ..

      - name: Checkout Maven Repo
        uses: actions/checkout@v6
        with:
          repository: XDcobra/maven
          token: ${{ secrets.MAVEN_REPO_PAT }}
          path: maven-repo

      - name: Deploy to GitHub Pages Maven
        run: |
          # Define Group IDs and Artifact IDs
          GROUP_ID="com.xdcobra.openssl"
          ARTIFACT_ID="openssl"
          VERSION="${{ inputs.version }}"
          REPO_ROOT="$(pwd)"
          
          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          ARTIFACT_DIR="$REPO_ROOT/maven-repo/$GROUP_PATH/$ARTIFACT_ID"
          VERSION_DIR="$ARTIFACT_DIR/$VERSION"
          
          # Ensure directories exist
          mkdir -p "$VERSION_DIR"
          
          # Copy the AAR
          AAR_FILE="$VERSION_DIR/$ARTIFACT_ID-$VERSION.aar"
          cp "openssl-$VERSION.aar" "$AAR_FILE"
          
          # Create POM file
          POM_FILE="$VERSION_DIR/$ARTIFACT_ID-$VERSION.pom"
          cat <<EOF > "$POM_FILE"
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0" 
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd" 
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <modelVersion>4.0.0</modelVersion>
            <groupId>$GROUP_ID</groupId>
            <artifactId>$ARTIFACT_ID</artifactId>
            <version>$VERSION</version>
            <packaging>aar</packaging>
            <description>OpenSSL Prebuilt Libraries for Android and iOS</description>
            <!-- Include dependencies here if needed -->
          </project>
          EOF
          
          # Update maven-metadata.xml
          python3 -c "
          import os, sys, datetime
          import xml.etree.ElementTree as ET

          group_id = sys.argv[1]
          artifact_id = sys.argv[2]
          version = sys.argv[3]
          base_dir = sys.argv[4]

          metadata_path = os.path.join(base_dir, 'maven-metadata.xml')

          versions = []
          if os.path.exists(base_dir):
              for item in os.listdir(base_dir):
                  if os.path.isdir(os.path.join(base_dir, item)) and not item.startswith('.'):
                      versions.append(item)

          if version not in versions:
              versions.append(version)

          def version_key(v):
              import re
              return [int(x) if x.isdigit() else x for x in re.split(r'[^0-9A-Za-z]', v)]
          versions.sort(key=version_key)

          if os.path.exists(metadata_path):
              tree = ET.parse(metadata_path)
              root = tree.getroot()
          else:
              root = ET.Element('metadata')
              ET.SubElement(root, 'groupId').text = group_id
              ET.SubElement(root, 'artifactId').text = artifact_id
              tree = ET.ElementTree(root)

          versioning = root.find('versioning')
          if versioning is None:
              versioning = ET.SubElement(root, 'versioning')

          v_latest = versioning.find('latest')
          if v_latest is None: v_latest = ET.SubElement(versioning, 'latest')
          v_latest.text = version

          v_release = versioning.find('release')
          if v_release is None: v_release = ET.SubElement(versioning, 'release')
          v_release.text = version

          versions_node = versioning.find('versions')
          if versions_node is None: versions_node = ET.SubElement(versioning, 'versions')
          
          versions_node.clear()
          for v in versions:
              ET.SubElement(versions_node, 'version').text = v

          last_updated = versioning.find('lastUpdated')
          if last_updated is None: last_updated = ET.SubElement(versioning, 'lastUpdated')
          last_updated.text = datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d%H%M%S')

          # Pretty-print XML for readable maven-metadata.xml output
          try:
              ET.indent(tree, space='  ')
          except AttributeError:
              # Fallback for older Python versions that do not provide ET.indent
              def _indent(elem, level=0):
                  i = '\n' + level * '  '
                  if len(elem):
                      if not elem.text or not elem.text.strip():
                          elem.text = i + '  '
                      for child in elem:
                          _indent(child, level + 1)
                      if not elem.tail or not elem.tail.strip():
                          elem.tail = i
                  elif level and (not elem.tail or not elem.tail.strip()):
                      elem.tail = i
              _indent(root)

          with open(metadata_path, 'w', encoding='utf-8') as f:
              f.write('<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n')
              tree.write(f, encoding='unicode')
          " "$GROUP_ID" "$ARTIFACT_ID" "$VERSION" "$ARTIFACT_DIR"

          # Generate checksums
          cd "$VERSION_DIR"
          for f in "$ARTIFACT_ID-$VERSION.aar" "$ARTIFACT_ID-$VERSION.pom"; do
            md5sum "$f" | cut -d' ' -f1 > "${f}.md5"
            sha1sum "$f" | cut -d' ' -f1 > "${f}.sha1"
          done

          cd "$ARTIFACT_DIR"
          md5sum "maven-metadata.xml" | cut -d' ' -f1 > "maven-metadata.xml.md5"
          sha1sum "maven-metadata.xml" | cut -d' ' -f1 > "maven-metadata.xml.sha1"
          cd "$REPO_ROOT"
          
          # Commit to the maven repository
          cd maven-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "$GROUP_PATH/$ARTIFACT_ID/"
          git commit -m "Publish $GROUP_ID:$ARTIFACT_ID:$VERSION" || echo "No changes to commit"
          git push
